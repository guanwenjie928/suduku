# 数独侦探 —— Nginx 配置
# 用法：将此文件放入 /etc/nginx/sites-available/ ，然后 ln -s 到 sites-enabled/
#
# 部署前请将 API_PORT 替换为实际 FastAPI 端口（由 deploy.sh 自动分配）

server {
    listen 80;
    server_name _;  # 改为你的域名或 IP

    # 前端静态文件
    root /opt/sudoku-detective/frontend/dist;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # API 反向代理到 FastAPI
    location /api {
        proxy_pass http://127.0.0.1:API_PORT;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（预留）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # SPA 回退 —— 所有非 /api 路径回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 缓存静态资源（30 天）
    location /assets {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
